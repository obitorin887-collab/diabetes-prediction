<!DOCTYPE html>
<html>
<head>

    <title>Diabetes Prediction</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
        }

        .container{
            width:500px;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px gray;
        }

        h1{
            text-align:center;
            color:#007BFF;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        h2{
            text-align:center;
            margin-top:20px;
            color:green;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Diabetes Prediction</h1>

<form action="/predict" method="post">

<input type="number" name="Pregnancies" placeholder="Pregnancies" required>

<input type="number" step="0.1" name="Glucose" placeholder="Glucose" required>

<input type="number" step="0.1" name="BloodPressure" placeholder="Blood Pressure" required>

<input type="number" step="0.1" name="SkinThickness" placeholder="Skin Thickness" required>

<input type="number" step="0.1" name="Insulin" placeholder="Insulin" required>

<input type="number" step="0.1" name="BMI" placeholder="BMI" required>

<input type="number" step="0.01" name="DiabetesPedigreeFunction" placeholder="Diabetes Pedigree Function" required>

<input type="number" name="Age" placeholder="Age" required>

<button type="submit">Predict</button>

</form>

{% if prediction %}

<h2>{{ prediction }}</h2>

{% endif %}

</div>

</body>
</html>
